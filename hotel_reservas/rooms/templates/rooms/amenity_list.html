{% extends 'base.html' %}

{% block title %}Amenities | Admin{% endblock %}

{% block content %}
  <div class="container-xxl py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="section-title mb-0">Amenities</h1>
      <div class="d-flex gap-2">
        <a href="{% url 'rooms:admin_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Habitaciones</a>
        <a href="{% url 'rooms:amenity_create' %}" class="btn btn-gold"><i class="bi bi-plus-lg me-1"></i>Nueva amenity</a>
      </div>
    </div>

    <div class="card card-elev">
      <div class="table-responsive">
        <table class="table mb-0 align-middle">
          <thead style="background: var(--bg);">
            <tr><th>Icono</th><th>Nombre</th><th>Clase</th><th class="text-end">Acciones</th></tr>
          </thead>
          <tbody>
            {% for a in amenities %}
              <tr>
                <td><i class="{{ a.icon }} text-gold" style="font-size: 22px;"></i></td>
                <td><strong>{{ a.name }}</strong></td>
                <td><code>{{ a.icon }}</code></td>
                <td class="text-end">
                  <a href="{% url 'rooms:amenity_edit' a.pk %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                  <a href="{% url 'rooms:amenity_delete' a.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                </td>
              </tr>
            {% empty %}
              <tr><td colspan="4" class="text-center muted py-4">Sin amenities.</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
{% endblock %}
