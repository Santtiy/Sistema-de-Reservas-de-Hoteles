{% extends 'base.html' %}

{% block title %}Eliminar habitación | Admin{% endblock %}

{% block content %}
  <div class="container-xxl py-4">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card card-elev p-4 text-center">
          <i class="bi bi-exclamation-triangle text-warning" style="font-size: 48px;"></i>
          <h3 class="mt-3">¿Eliminar habitación {{ object.number }}?</h3>
          <p class="muted">Esta acción no se puede deshacer.</p>
          <form method="post" class="d-flex justify-content-center gap-2 mt-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Eliminar</button>
            <a href="{% url 'rooms:admin_list' %}" class="btn btn-outline-secondary">Cancelar</a>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
