{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Nueva contrasena | Hotel Reservas{% endblock %}

{% block content %}
  <div class="auth-shell">
    <div class="card card-elev auth-card" style="max-width: 420px;">
      <div class="text-center mb-3">
        <div class="brand justify-content-center" style="color: var(--gold-dark); font-size: 24px; display: flex; justify-content: center; gap: 10px;">
          <i class="bi bi-buildings-fill"></i> Hotel Reservas
        </div>
      </div>
      <h4 style="color: var(--navy); text-align: center;">Nueva contrasena</h4>
      <form method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-gold w-100" type="submit">Guardar</button>
      </form>
    </div>
  </div>
{% endblock %}
