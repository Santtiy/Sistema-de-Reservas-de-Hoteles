{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Editar reserva | Admin{% endblock %}

{% block content %}
  <div class="container-xxl py-4">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card card-elev p-4">
          <h3 class="section-title">Editar reserva {{ object.confirmation_code }}</h3>
          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-gold"><i class="bi bi-save me-1"></i>Guardar</button>
              <a href="{% url 'reservations:admin_detail' object.pk %}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
