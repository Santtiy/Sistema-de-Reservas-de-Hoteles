{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Restablecer contrasena | Hotel Reservas{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-3">Restablecer contrasena</h2>
      <form method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-primary" type="submit">Enviar enlace</button>
      </form>
    </div>
  </div>
{% endblock %}
