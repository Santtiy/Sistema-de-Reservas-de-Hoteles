{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login | Hotel Reservas{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-3">Iniciar sesion</h2>
      <form method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-primary" type="submit">Ingresar</button>
        <a class="btn btn-link" href="{% url 'accounts:password_reset' %}">Olvidaste tu contrasena?</a>
      </form>
    </div>
  </div>
{% endblock %}
