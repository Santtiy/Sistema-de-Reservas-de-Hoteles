{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login | Hotel Reservas{% endblock %}

{% block content %}
  <div class="auth-shell">
    <div class="card card-elev auth-card" style="max-width: 420px;">
      <div class="text-center mb-4">
        <div class="brand justify-content-center" style="color: var(--gold-dark); font-size: 24px; display: flex; justify-content: center; gap: 10px;">
          <i class="bi bi-buildings-fill"></i> Hotel Reservas
        </div>
        <div class="muted mt-1" style="font-size: 14px;">Bienvenido de nuevo</div>
      </div>
      <form method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}
        <div class="text-end mb-3">
          <a class="text-decoration-none text-gold" style="font-size: 13px; font-weight: 600;" href="{% url 'accounts:password_reset' %}">¿Olvidaste tu contrasena?</a>
        </div>
        <button class="btn btn-gold w-100" type="submit">Iniciar sesion</button>
      </form>
      <div class="text-center mt-3 muted" style="font-size: 14px;">
        ¿No tienes cuenta?
        <a class="text-gold text-decoration-none fw-semibold" href="{% url 'accounts:register' %}">Registrate</a>
      </div>
    </div>
  </div>
{% endblock %}
