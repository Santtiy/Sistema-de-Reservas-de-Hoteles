{% extends 'base.html' %}

{% block title %}Correo enviado | Hotel Reservas{% endblock %}

{% block content %}
  <div class="auth-shell">
    <div class="card card-elev auth-card" style="max-width: 420px;">
      <div class="text-center">
        <div class="confirmation-icon"><i class="bi bi-envelope-check"></i></div>
        <h4 style="color: var(--navy);">Enlace enviado</h4>
        <p class="muted">Revisa tu correo para continuar con el restablecimiento.</p>
        <a class="btn btn-gold w-100" href="{% url 'accounts:login' %}">Volver a iniciar sesion</a>
      </div>
    </div>
  </div>
{% endblock %}
