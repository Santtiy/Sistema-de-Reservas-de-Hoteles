{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Registro | Hotel Reservas{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-7">
      <h2 class="mb-3">Crear cuenta</h2>
      <form method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-success" type="submit">Registrarme</button>
      </form>
    </div>
  </div>
{% endblock %}
