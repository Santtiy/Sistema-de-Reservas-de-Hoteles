{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Registro | Hotel Reservas{% endblock %}

{% block content %}
  <div class="auth-shell">
    <div class="card card-elev auth-card" style="max-width: 480px;">
      <div class="text-center mb-4">
        <div class="brand justify-content-center" style="color: var(--gold-dark); font-size: 24px; display: flex; justify-content: center; gap: 10px;">
          <i class="bi bi-buildings-fill"></i> Hotel Reservas
        </div>
        <div class="muted mt-1" style="font-size: 14px;">Crea tu cuenta para reservar mas rapido</div>
      </div>
      <form method="post" novalidate>
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-gold w-100" type="submit">Crear cuenta</button>
      </form>
      <div class="text-center mt-3 muted" style="font-size: 14px;">
        ¿Ya tienes cuenta?
        <a class="text-gold text-decoration-none fw-semibold" href="{% url 'accounts:login' %}">Inicia sesion</a>
      </div>
    </div>
  </div>
{% endblock %}
